# Tom Build Configuration for tom_d4rt_generator

versioner:
  variable-prefix: d4rtGen

compiler:
  compiles:
    # macOS ARM64 - compile for self + all Linux targets
    - pipeline:
        - shell mkdir -p $TOM_BINARY_PATH/%{target-platform-vs}
        - shell dart compile exe %{file} --target-os=%{target-os} -o $TOM_BINARY_PATH/%{target-platform-vs}/%{file.name}
      files: bin/d4rtgen.dart
      targets: [darwin-arm64, linux-x64, linux-arm64, linux-armhf]
      platforms: [darwin-arm64]
    
    # Unix-like platforms - compile for self only
    - pipeline:
        - shell mkdir -p $TOM_BINARY_PATH/%{target-platform-vs}
        - shell dart compile exe %{file} -o $TOM_BINARY_PATH/%{target-platform-vs}/%{file.name}
      files: bin/d4rtgen.dart
      platforms: [darwin-x64, linux-*]

    # Windows - compile for self only
    - pipeline:
        - shell dart compile exe %{file} -o $TOM_BINARY_PATH/win32-x64/%{file.name}.exe
      files: bin/d4rtgen.dart
      platforms: [win32-*]

  postcompile:
    # Make binaries executable on Unix-like systems
    - pipeline:
        - shell chmod -R +x $TOM_BINARY_PATH/%{current-platform-vs}/
      platforms: [macos, linux]
